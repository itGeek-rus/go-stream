version: '3'

vars:
  GOFLAGS: -trimpath
  BIN_DIR: '{{.ROOT_DIR}}/bin'

tasks:
  default:
    desc: Run tests
    cmds:
      - task: test

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .
      - goimports -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    cmds:
      - go test -race -count=1 -timeout 60s ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  build:
    desc: Build module
    cmds:
      - go build ./...

  gosec:
    desc: Security scan
    cmds:
      - gosec -quiet ./...

  vuln:
    desc: Vulnerability check
    cmds:
      - govulncheck ./...

  examples:
    desc: Build examples
    cmds:
      - go build ./examples/...

  ci:
    desc: Full local CI
    deps: [tidy, fmt, vet, lint, gosec, vuln, test, build, examples]

  cleancode:
    desc: Запуск всех проверок
    deps:
      - tidy
      - vet
      - lint
      - gosec
      - vuln
      - test
      - build
      - examples